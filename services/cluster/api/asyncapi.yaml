asyncapi: 3.0.0
info:
  title: cluster events API
  version: 0.1.0
channels:
  cluster.status.updated:
    address: cluster.status.updated
    messages:
      statusUpdated:
        $ref: '#/components/messages/StatusUpdated'
operations:
  publishStatusUpdated:
    action: send
    channel:
      $ref: '#/channels/cluster.status.updated'
    messages:
      - $ref: '#/channels/cluster.status.updated/messages/statusUpdated'
components:
  messages:
    StatusUpdated:
      payload:
        type: object
        properties:
          type:
            type: string
          source:
            type: string
          timestamp:
            type: string
            format: date-time
          payload:
            type: object
            additionalProperties: true
