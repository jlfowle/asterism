apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pfsense-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: pfsense-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /asterism/pfsense
