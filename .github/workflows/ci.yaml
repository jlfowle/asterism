name: CI and Release

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  metadata:
    name: Resolve Version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next semantic version
        id: next_version
        uses: thenativeweb/get-next-version@2.6.3
        with:
          prefix: v

      - name: Set build version
        id: set_version
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SHA="${{ github.sha }}"
            SHORT_SHA="${SHA::7}"
            VERSION="${{ steps.next_version.outputs.version }}-pr.${{ github.event.pull_request.number }}-commit.${SHORT_SHA}"
          else
            VERSION="${{ steps.next_version.outputs.version }}"

            # Ensure every push to main yields a unique release version even when
            # commit types do not trigger a semantic bump (for example build/chore).
            LATEST_TAG=$(git tag --list "v*" --sort=-version:refname | head -n 1 || true)
            if [[ -n "${LATEST_TAG}" && "${VERSION}" == "${LATEST_TAG}" ]]; then
              BASE="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE}"
              PATCH=$((PATCH + 1))
              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  inventory:
    name: Discover Services
    runs-on: ubuntu-24.04
    outputs:
      services: ${{ steps.discover.outputs.services }}
      containerized: ${{ steps.discover.outputs.containerized }}
      kustomize_ready: ${{ steps.discover.outputs.kustomize_ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build service inventory
        id: discover
        working-directory: services
        run: |
          SERVICES=$(./inventory.sh)
          CONTAINERIZED=$(jq -c '[ .[] | select(.containerized == true) ]' <<< "$SERVICES")
          KUSTOMIZE_READY=$(jq -c '[ .[] | select(.has_kustomize_latest == true) ]' <<< "$SERVICES")

          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "containerized=$CONTAINERIZED" >> "$GITHUB_OUTPUT"
          echo "kustomize_ready=$KUSTOMIZE_READY" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify ${{ matrix.service.id }}
    needs: inventory
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.inventory.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: contains(toJson(matrix.service.tools), 'nodejs')
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: services/${{ matrix.service.id }}/yarn.lock

      - name: Set up Go
        if: contains(toJson(matrix.service.tools), 'go')
        uses: actions/setup-go@v6
        with:
          go-version-file: services/${{ matrix.service.id }}/go.mod

      - name: Run tests
        working-directory: services/${{ matrix.service.id }}
        run: make test

      - name: Run lint
        working-directory: services/${{ matrix.service.id }}
        run: make lint

      - name: Run build
        working-directory: services/${{ matrix.service.id }}
        run: make build

      - name: Scan service source with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: services/${{ matrix.service.id }}
          format: sarif
          output: trivy-${{ matrix.service.id }}.sarif

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.service.id }}.sarif

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.service.id }}
          path: |
            services/${{ matrix.service.id }}/coverage
            services/${{ matrix.service.id }}/coverage.out
            services/${{ matrix.service.id }}/coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.service.id }}
          path: |
            services/${{ matrix.service.id }}/test-results
            services/${{ matrix.service.id }}/test-results.json

  containers:
    name: Build Container ${{ matrix.service.id }}
    needs:
      - metadata
      - inventory
      - verify
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.inventory.outputs.containerized) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service.id }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}-${{ matrix.service.id }}:${{ needs.metadata.outputs.version }}
            ghcr.io/${{ github.repository }}-${{ matrix.service.id }}:latest
          build-args: |
            VERSION=${{ needs.metadata.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.run_id }}
            COMMIT_SHA=${{ github.sha }}

      - name: Install Cosign
        if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v4.1.1

      - name: Sign image with keyless Cosign
        if: github.ref == 'refs/heads/main'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}-${{ matrix.service.id }}@${{ steps.build.outputs.digest }}

      - name: Generate SPDX SBOM
        if: github.ref == 'refs/heads/main'
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}-${{ matrix.service.id }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.service.id }}.spdx.json

      - name: Attest build provenance
        if: github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}-${{ matrix.service.id }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Write image metadata
        if: github.ref == 'refs/heads/main'
        run: |
          jq -n \
            --arg service "${{ matrix.service.id }}" \
            --arg image "ghcr.io/${{ github.repository }}-${{ matrix.service.id }}" \
            --arg digest "${{ steps.build.outputs.digest }}" \
            --arg version "${{ needs.metadata.outputs.version }}" \
            '{service: $service, image: $image, digest: $digest, version: $version}' \
            > image-metadata-${{ matrix.service.id }}.json

      - name: Upload supply chain artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: supply-chain-${{ matrix.service.id }}
          path: |
            sbom-${{ matrix.service.id }}.spdx.json
            image-metadata-${{ matrix.service.id }}.json

  render-kustomize:
    name: Render Kustomize ${{ matrix.service.id }}
    needs:
      - inventory
      - verify
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.inventory.outputs.kustomize_ready) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Render latest overlay
        run: |
          mkdir -p rendered
          kustomize build deploy/${{ matrix.service.id }}/latest > rendered/${{ matrix.service.id }}-latest.yaml

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v7
        with:
          name: rendered-${{ matrix.service.id }}
          path: rendered/${{ matrix.service.id }}-latest.yaml

  release:
    name: Publish GitHub Release
    needs:
      - metadata
      - inventory
      - containers
      - render-kustomize
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download supply-chain artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: supply-chain-*
          merge-multiple: true

      - name: Download rendered manifests
        uses: actions/download-artifact@v8
        with:
          pattern: rendered-*
          merge-multiple: true

      - name: Build release manifest
        run: |
          jq -n \
            --arg version "${{ needs.metadata.outputs.version }}" \
            --arg commit "${{ github.sha }}" \
            --arg created "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{version: $version, commit: $commit, created: $created, services: []}' > release-manifest.json

          for f in image-metadata-*.json; do
            [ -f "$f" ] || continue
            release_service=$(cat "$f")
            release_manifest_tmp=$(mktemp)
            jq --argjson svc "$release_service" '.services += [$svc]' release-manifest.json > "$release_manifest_tmp"
            mv "$release_manifest_tmp" release-manifest.json
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.version }}
          name: ${{ needs.metadata.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-manifest.json
            *-latest.yaml
            sbom-*.spdx.json
            image-metadata-*.json
