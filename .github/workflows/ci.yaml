name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  metadata:
    name: Resolve Version
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next semantic version
        id: next_version
        uses: thenativeweb/get-next-version@2.7.1
        with:
          prefix: v

      - name: Set build version
        id: set_version
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA::7}"
          VERSION="${{ steps.next_version.outputs.version }}-pr.${{ github.event.pull_request.number }}-commit.${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  inventory:
    name: Discover Services
    runs-on: ubuntu-24.04
    outputs:
      services: ${{ steps.discover.outputs.services }}
      containerized: ${{ steps.discover.outputs.containerized }}
      kustomize_ready: ${{ steps.discover.outputs.kustomize_ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build service inventory
        id: discover
        working-directory: services
        run: |
          SERVICES=$(./inventory.sh)
          CONTAINERIZED=$(jq -c '[ .[] | select(.containerized == true) ]' <<< "$SERVICES")
          KUSTOMIZE_READY=$(jq -c '[ .[] | select(.has_kustomize_latest == true) ]' <<< "$SERVICES")

          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "containerized=$CONTAINERIZED" >> "$GITHUB_OUTPUT"
          echo "kustomize_ready=$KUSTOMIZE_READY" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify ${{ matrix.service.id }}
    needs: inventory
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.inventory.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: contains(toJson(matrix.service.tools), 'nodejs')
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: services/${{ matrix.service.id }}/yarn.lock

      - name: Set up Go
        if: contains(toJson(matrix.service.tools), 'go')
        uses: actions/setup-go@v6
        with:
          go-version-file: services/${{ matrix.service.id }}/go.mod

      - name: Run tests
        working-directory: services/${{ matrix.service.id }}
        run: make test

      - name: Run lint
        working-directory: services/${{ matrix.service.id }}
        run: make lint

      - name: Run build
        working-directory: services/${{ matrix.service.id }}
        run: make build

      - name: Scan service source with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: services/${{ matrix.service.id }}
          format: sarif
          output: trivy-${{ matrix.service.id }}.sarif

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.service.id }}.sarif

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.service.id }}
          path: |
            services/${{ matrix.service.id }}/coverage
            services/${{ matrix.service.id }}/coverage.out
            services/${{ matrix.service.id }}/coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.service.id }}
          path: |
            services/${{ matrix.service.id }}/test-results
            services/${{ matrix.service.id }}/test-results.json

  containers:
    # The PR build is the source of truth for release publication; this job only packages artifacts.
    name: Build Container ${{ matrix.service.id }}
    needs:
      - metadata
      - inventory
      - verify
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.inventory.outputs.containerized) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image archive
        uses: docker/build-push-action@v7
        with:
          context: services/${{ matrix.service.id }}
          push: false
          tags: |
            ghcr.io/${{ github.repository }}-${{ matrix.service.id }}:${{ needs.metadata.outputs.version }}
          outputs: type=docker,dest=${{ runner.temp }}/image-${{ matrix.service.id }}.tar
          build-args: |
            VERSION=${{ needs.metadata.outputs.version }}
            BUILD_DATE=${{ github.event.pull_request.updated_at || github.run_id }}
            COMMIT_SHA=${{ github.sha }}

      - name: Generate SBOM for image archive
        uses: anchore/sbom-action@v0
        with:
          file: ${{ runner.temp }}/image-${{ matrix.service.id }}.tar
          format: spdx-json
          artifact-name: sbom-${{ matrix.service.id }}
          output-file: sbom-${{ matrix.service.id }}.spdx.json

      - name: Write image metadata
        run: |
          jq -n \
            --arg service "${{ matrix.service.id }}" \
            --arg image "ghcr.io/${{ github.repository }}-${{ matrix.service.id }}" \
            --arg tag "${{ needs.metadata.outputs.version }}" \
            --arg version "${{ needs.metadata.outputs.version }}" \
            '{service: $service, image: $image, tag: $tag, version: $version}' \
            > image-metadata-${{ matrix.service.id }}.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.service.id }}
          path: |
            ${{ runner.temp }}/image-${{ matrix.service.id }}.tar
            image-metadata-${{ matrix.service.id }}.json
            sbom-${{ matrix.service.id }}.spdx.json

  render-kustomize:
    name: Render Kustomize ${{ matrix.service.id }}
    needs:
      - inventory
      - verify
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.inventory.outputs.kustomize_ready) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Render latest overlay
        run: |
          mkdir -p rendered
          kustomize build deploy/${{ matrix.service.id }}/latest > rendered/${{ matrix.service.id }}-latest.yaml

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v7
        with:
          name: rendered-${{ matrix.service.id }}
          path: rendered/${{ matrix.service.id }}-latest.yaml
