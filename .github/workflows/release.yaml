name: Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: read
  id-token: write
  actions: read

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    environment: release
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
      SOURCE_CI_WORKFLOW_FILE: 'ci.yaml'
      COSIGN_EXPERIMENTAL: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Compute release version
        id: version
        uses: thenativeweb/get-next-version@2.7.1
        with:
          prefix: v

      - name: Set release version
        id: set_version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LATEST_TAG=$(git tag --list "v*" --sort=-version:refname | head -n 1 || true)
          if [[ -n "${LATEST_TAG}" && "${VERSION}" == "${LATEST_TAG}" ]]; then
            BASE="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE}"
            PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Discover release services
        id: inventory
        working-directory: services
        run: |
          SERVICES=$(./inventory.sh)
          CONTAINERIZED=$(jq -c '[ .[] | select(.containerized == true) ]' <<< "$SERVICES")

          if [[ "$(jq 'length' <<< "$CONTAINERIZED")" -eq 0 ]]; then
            echo "No containerized services were discovered for release." >&2
            exit 1
          fi

          echo "containerized=${CONTAINERIZED}" >> "$GITHUB_OUTPUT"

      - name: Validate release automation configuration
        env:
          CD_REPO_FULL_NAME: ${{ vars.CD_REPO_FULL_NAME }}
          CD_REPO_GITHUB_APP_ID: ${{ vars.CD_REPO_GITHUB_APP_ID }}
          CD_REPO_GITHUB_APP_PRIVATE_KEY: ${{ secrets.CD_REPO_GITHUB_APP_PRIVATE_KEY }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_SERVER: ${{ vars.ARGOCD_SERVER }}
          ARGOCD_APP_NAME: ${{ vars.ARGOCD_APP_NAME }}
        run: |
          missing=()
          for name in CD_REPO_FULL_NAME CD_REPO_GITHUB_APP_ID CD_REPO_GITHUB_APP_PRIVATE_KEY ARGOCD_AUTH_TOKEN ARGOCD_SERVER ARGOCD_APP_NAME; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing release automation configuration: ${missing[*]}" >&2
            exit 1
          fi

      # Reuse the successful PR workflow run from the exact head SHA so the release stays tied to the reviewed build.
      - name: Locate source CI run
        id: source_run
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.request

          repo = os.environ['REPOSITORY']
          pr_head_sha = os.environ['PR_HEAD_SHA']
          workflow_file = os.environ['SOURCE_CI_WORKFLOW_FILE']
          token = os.environ['GITHUB_TOKEN']

          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
          }

          page = 1
          while True:
              url = (
                  f'https://api.github.com/repos/{repo}/actions/workflows/{workflow_file}/runs'
                  f'?event=pull_request&status=success&head_sha={pr_head_sha}&per_page=100&page={page}'
              )
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request) as response:
                  payload = json.load(response)

              runs = payload.get('workflow_runs', [])
              if not runs:
                  break

              for run in runs:
                  if run.get('conclusion') != 'success':
                      continue
                  if run.get('head_sha') == pr_head_sha:
                      with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
                          output.write(f"run_id={run['id']}\n")
                          output.write(f"run_url={run['html_url']}\n")
                      sys.exit(0)

              if len(runs) < 100:
                  break
              page += 1

          print(f'Could not find a successful CI run for PR head SHA {pr_head_sha}', file=sys.stderr)
          sys.exit(1)
          PY

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.source_run.outputs.run_id }}
          pattern: build-*
          merge-multiple: true
          path: artifacts/build

      - name: Normalize release source artifacts
        env:
          EXPECTED_SERVICES_JSON: ${{ steps.inventory.outputs.containerized }}
        run: |
          scripts/release/normalize-artifacts.sh \
            --source artifacts/build \
            --dest artifacts/release-source \
            --expected-services-json "$EXPECTED_SERVICES_JSON"

      - name: Download rendered manifests
        uses: actions/download-artifact@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.source_run.outputs.run_id }}
          pattern: rendered-*
          merge-multiple: true
          path: artifacts/rendered

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Auxiliary release metadata is assembled here because it does not change the shipped bits.
      - name: Publish images and record release metadata
        env:
          EXPECTED_SERVICES_JSON: ${{ steps.inventory.outputs.containerized }}
        run: |
          scripts/release/publish-images.sh \
            --source artifacts/release-source \
            --release-dir artifacts/release \
            --version "${{ steps.set_version.outputs.version }}" \
            --expected-services-json "$EXPECTED_SERVICES_JSON"

      - name: Build release manifest
        env:
          EXPECTED_SERVICES_JSON: ${{ steps.inventory.outputs.containerized }}
          SOURCE_CI_RUN_ID: ${{ steps.source_run.outputs.run_id }}
          SOURCE_CI_RUN_URL: ${{ steps.source_run.outputs.run_url }}
        run: |
          scripts/release/build-release-manifest.sh \
            --release-dir artifacts/release \
            --output release-manifest.json \
            --version "${{ steps.set_version.outputs.version }}" \
            --commit "${{ env.MERGE_COMMIT_SHA }}" \
            --expected-services-json "$EXPECTED_SERVICES_JSON"

      - name: Compute release manifest digest
        id: release_manifest
        run: |
          digest="$(sha256sum release-manifest.json | awk '{print $1}')"
          echo "sha256=${digest}" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.set_version.outputs.version }}
          name: ${{ steps.set_version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-manifest.json
            artifacts/rendered/*.yaml
            artifacts/release-source/sbom-*.spdx.json
            artifacts/release/image-metadata-*.json

      - name: Resolve GitOps repository
        id: cd_repo
        env:
          CD_REPO_FULL_NAME: ${{ vars.CD_REPO_FULL_NAME }}
        run: |
          if [[ -z "$CD_REPO_FULL_NAME" ]]; then
            echo "Repository variable CD_REPO_FULL_NAME must be configured." >&2
            exit 1
          fi
          if [[ "$CD_REPO_FULL_NAME" != */* ]]; then
            echo "CD_REPO_FULL_NAME must be in owner/name form: $CD_REPO_FULL_NAME" >&2
            exit 1
          fi

          owner="${CD_REPO_FULL_NAME%%/*}"
          name="${CD_REPO_FULL_NAME#*/}"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "full_name=${CD_REPO_FULL_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create os-config GitHub App token
        id: cd_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.CD_REPO_GITHUB_APP_ID }}
          private-key: ${{ secrets.CD_REPO_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ steps.cd_repo.outputs.owner }}
          repositories: ${{ steps.cd_repo.outputs.name }}

      - name: Checkout os-config repository
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.cd_repo.outputs.full_name }}
          token: ${{ steps.cd_token.outputs.token }}
          path: os-config
          ref: main
          fetch-depth: 0

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Promote release in GitOps repository
        run: |
          scripts/release/promote-os-config.py \
            --repo-dir os-config \
            --version "${{ steps.set_version.outputs.version }}" \
            --source-repo "${{ github.repository }}" \
            --commit "${{ env.MERGE_COMMIT_SHA }}" \
            --manifest-sha256 "${{ steps.release_manifest.outputs.sha256 }}"

      - name: Validate promoted GitOps overlay
        run: |
          for attempt in 1 2 3 4 5 6; do
            if kustomize build os-config/app/asterism > /tmp/asterism-promoted.yaml; then
              exit 0
            fi
            echo "Promoted overlay did not render yet; retrying (${attempt}/6)."
            sleep 10
          done

          kustomize build os-config/app/asterism

      - name: Commit and push CD promotion
        id: cd_commit
        run: |
          git -C os-config config user.name "asterism-release[bot]"
          git -C os-config config user.email "asterism-release[bot]@users.noreply.github.com"

          if git -C os-config diff --quiet -- app/asterism/kustomization.yaml; then
            echo "os-config already points at ${{ steps.set_version.outputs.version }}."
          else
            git -C os-config add app/asterism/kustomization.yaml
            git -C os-config commit -m "chore(asterism): promote ${{ steps.set_version.outputs.version }}"
            git -C os-config push origin HEAD:main
          fi

          echo "sha=$(git -C os-config rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify Argo CD deployment
        env:
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_SERVER: ${{ vars.ARGOCD_SERVER }}
          ARGOCD_APP_NAME: ${{ vars.ARGOCD_APP_NAME }}
          ARGOCD_PROJECT: ${{ vars.ARGOCD_PROJECT }}
          ARGOCD_APP_NAMESPACE: ${{ vars.ARGOCD_APP_NAMESPACE }}
        run: |
          if [[ -z "$ARGOCD_AUTH_TOKEN" ]]; then
            echo "Release environment secret ARGOCD_AUTH_TOKEN must be configured." >&2
            exit 1
          fi
          if [[ -z "$ARGOCD_SERVER" || -z "$ARGOCD_APP_NAME" ]]; then
            echo "Repository variables ARGOCD_SERVER and ARGOCD_APP_NAME must be configured." >&2
            exit 1
          fi

          scripts/release/verify-argocd-deployment.py \
            --server "$ARGOCD_SERVER" \
            --token "$ARGOCD_AUTH_TOKEN" \
            --app "$ARGOCD_APP_NAME" \
            --project "$ARGOCD_PROJECT" \
            --namespace "$ARGOCD_APP_NAMESPACE" \
            --release-manifest release-manifest.json \
            --release-version "${{ steps.set_version.outputs.version }}" \
            --release-commit "${{ env.MERGE_COMMIT_SHA }}" \
            --manifest-sha256 "${{ steps.release_manifest.outputs.sha256 }}" \
            --os-config-revision "${{ steps.cd_commit.outputs.sha }}"
