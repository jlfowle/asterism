name: Lint PR

permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-24.04

    steps:
      - name: Bypass title validation for Dependabot
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        run: echo "Dependabot pull request titles are generated automatically and are exempt from semantic title linting."

      - name: Validate PR title
        id: lint_pr_title
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: amannn/action-semantic-pull-request@v4
        with:
          validateSingleCommit: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: marocchino/sticky-pull-request-comment@v2
        if: github.event.pull_request.user.login != 'dependabot[bot]' && always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            Hey there and thank you for opening this pull request! 👋🏼
            
            We require pull request titles to follow the [Conventional Commits specification](https://www.conventionalcommits.org/en/v1.0.0/) and it looks like your proposed title needs to be adjusted.

            Details:
            
            ```
            ${{ steps.lint_pr_title.outputs.error_message }}
            ```

      # Delete a previous comment when the issue has been resolved
      - if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && steps.lint_pr_title.outputs.error_message == null }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:   
          header: pr-title-lint-error
          delete: true

  enable-automerge:
    name: Enable auto-merge
    runs-on: ubuntu-24.04

    steps:
      - name: Enable auto-merge
        if: success()
        uses: peter-evans/enable-pull-request-automerge@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
    
